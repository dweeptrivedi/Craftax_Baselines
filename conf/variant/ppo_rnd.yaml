# @package _global_
variant_name: ppo_rnd
run_target: ppo_rnd.run_ppo

# ppo_rnd.make_train default differs from ppo (1 vs 4).
exploration_update_epochs: 1

use_rnd: true
rnd_layer_size: 256
rnd_output_size: 512
rnd_lr: 3.0e-4
rnd_reward_coeff: 1.0
rnd_loss_coeff: 0.01
rnd_gae_coeff: 0.01
rnd_is_episodic: false
