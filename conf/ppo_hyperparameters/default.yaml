# @package _global_
total_timesteps: 1.0e9    # cast to int(float(...)) in train.py
num_steps: 64
num_minibatches: 8
update_epochs: 4
lr: 2.0e-4
anneal_lr: true
gamma: 0.99
gae_lambda: 0.8
clip_eps: 0.2
ent_coef: 0.01
vf_coef: 0.5
max_grad_norm: 1.0
# Note: ``exploration_update_epochs`` is variant-specific (ppo: 4,
# ppo_rnd: 1, ppo_rnn: not used). Lives in the variant configs.
